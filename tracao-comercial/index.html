function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cp(txt, btn) {
  if (!txt) return;
  navigator.clipboard.writeText(txt).then(() => {
    btn.classList.add('ok'); btn.textContent = '✓';
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => { t.classList.remove('show'); btn.classList.remove('ok'); btn.textContent = 'Copiar'; }, 1800);
  });
}

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (el) el.classList.add('active');
}

}

      <div class="section-title">📅 Grade Editorial</div>${gradeHtml}
      <div class="section-title">✍️ Posts Detalhados · Copy + Roteiro</div>${postsHtml}
      ${s.metricas&&s.metricas.length?`<div class="section-title">📊 Métricas · Metas</div>
        <div class="card" style="padding:0;overflow:hidden;margin-bottom:20px">
          <table class="met-table"><thead><tr><th>Métrica</th><th>Meta</th></tr></thead>
          <tbody>${metHtml}</tbody></table>
        </div>`:''}
    </div>`);
}

function buildRadar() {
  /* ── Pulse KPIs ── */
  const movimentos = RADAR.concorrentes.filter(c => c.mencionouIA || c.mudancaDetectada).length;
  const alertasAltos = (RADAR.alertas||[]).filter(a => a.nivel === 'alto').length;
  const pulseHtml = `
    <div class="pulse-strip">
      <div class="pulse-chip">
        <div class="pulse-num">${RADAR.concorrentes.length}</div>
        <div class="pulse-lbl">concorrentes<br>monitorados</div>
      </div>
      <div class="pulse-chip">
        <div class="pulse-num">${movimentos}</div>
        <div class="pulse-lbl">movimentos<br>detectados</div>
      </div>
      <div class="pulse-chip ${alertasAltos > 0 ? 'alert' : ''}">
        <div class="pulse-num">${alertasAltos}</div>
        <div class="pulse-lbl">alerta${alertasAltos!==1?'s':''}<br>${alertasAltos!==1?'altos':'alto'}</div>
      </div>
    </div>`;

  /* ── Alert banner (top alerta alto) ── */
  const topAlerta = (RADAR.alertas||[]).find(a => a.nivel === 'alto');
  const alertBannerHtml = topAlerta ? `
    <div class="alert-banner">
      <div class="ab-icon">⚠️</div>
      <div>
        <div class="ab-title">${esc(topAlerta.titulo)}</div>
        <div class="ab-acao">Ação recomendada: ${esc(topAlerta.acao)}</div>
      </div>
    </div>` : '';

  /* ── Competitor cards (enriched) ── */
  const cardsHtml = RADAR.concorrentes.map(c => {
    const iaBadge = c.mencionouIA
      ? `<span class="ia-badge ia-sim">✓ SIM</span>`
      : `<span class="ia-badge ia-nao">NÃO</span>`;
    const mudBadge = c.mudancaDetectada
      ? `<span class="ia-badge mud-sim">⚡ SIM</span>`
      : `<span class="ia-badge mud-nao">NÃO</span>`;
    return `
    <div class="radar-card">
      <div class="radar-card-head" style="background:${esc(c.headBg)};color:${esc(c.headFg)}">
        ${esc(c.nome)}
        <span class="radar-tag" style="background:${esc(c.tagBg)};color:${esc(c.tagFg)};margin-left:auto">${esc(c.tag)}</span>
      </div>
      <div class="radar-card-body">
        <div class="comp-fields">
          <div class="comp-field" style="grid-column:1/-1">
            <div class="cf-label">📢 O que publicaram esta semana</div>
            <div class="cf-value">${esc(c.oQuePublicaram||'—')}</div>
          </div>
          <div class="comp-field">
            <div class="cf-label">🤖 Mencionou IA?</div>
            <div class="cf-value">${iaBadge}</div>
          </div>
          <div class="comp-field">
            <div class="cf-label">🔄 Mudança detectada?</div>
            <div class="cf-value">${mudBadge}</div>
          </div>
          <div class="comp-field" style="grid-column:1/-1">
            <div class="cf-label">🎯 O que TRAÇÃO usa disso</div>
            <div class="cf-value">${esc(c.opp)}</div>
          </div>
        </div>
        <div class="radar-copy"><strong>Ângulo AG-05:</strong> "${esc(c.angulo)}"</div>
      </div>
    </div>`;
  }).join('');

  /* ── Tendências ── */
  const tendenciasHtml = (RADAR.tendencias||[]).map(t => `
    <div class="trend-card">
      <h4>${esc(t.titulo)}</h4>
      <p>${esc(t.corpo)}</p>
    </div>`).join('');

  /* ── Alertas/ameaças ── */
  const ameacasHtml = (RADAR.alertas||[]).map(a => `
    <div class="threat-card threat-${esc(a.nivel)}">
      <h4>${esc(a.titulo)}</h4>
      <div class="threat-corpo">${esc(a.corpo)}</div>
      <div class="threat-acao">→ ${esc(a.acao)}</div>
    </div>`).join('');

  /* ── Oportunidades (próxima semana) ── */
  const oppsHtml = (RADAR.oportunidades||[]).map(o => `
    <div class="opp-card">
      <h4>🎯 ${esc(o.titulo)}</h4>
      <div class="opp-meta">
        <span>${esc(o.pilar)}</span>
        <span>${esc(o.formato)}</span>
        ${o.trigger?`<span style="background:#FEF3C7;color:#92400E;">trigger: ${esc(o.trigger)}</span>`:''}
        ${o.prioridade==='alta'?`<span style="background:#FEE2E2;color:#A32D2D;">prioridade alta</span>`:`<span>prioridade média</span>`}
      </div>
      <div class="opp-tema">"${esc(o.tema)}"</div>
      <div class="opp-why">⚡ <strong>Por que agora:</strong> ${esc(o.porqueAgora)}</div>
    </div>`).join('');

  const radarFileName = RADAR.radarFile.split('\\').pop();

  document.getElementById('pages-container').insertAdjacentHTML('beforeend', `
    <div id="page-radar" class="page">
      <div class="radar-header">
        <div>
          <div style="font-size:11px;opacity:.6;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">🔭 Inteligência Competitiva</div>
          <h2>Radar · ${esc(CLIENTE.nome)}</h2>
          <div class="radar-meta">Última execução: ${esc(RADAR.ultimaExecucao)} · Próxima: ${esc(RADAR.proximaExecucao)}</div>
        </div>
        <span class="radar-badge">${RADAR.concorrentes.length} concorrentes monitorados</span>
      </div>

      ${RADAR.resumoExecutivo ? `
      <div class="exec-brief">
        <div class="exec-label">📌 Briefing Executivo · ${esc(RADAR.ultimaExecucao)}</div>
        <div class="exec-text">${esc(RADAR.resumoExecutivo)}</div>
      </div>` : ''}

      ${pulseHtml}
      ${alertBannerHtml}

      <div class="rt-toggle-t">
        <button id="rtTChipCorrente" class="rt-chip-t rt-chip-corrente-t" onclick="setRadarModeT('corrente')">📊 Semana em curso</button>
        <button id="rtTChipProxima"  class="rt-chip-t rt-chip-proxima-t"  onclick="setRadarModeT('proxima')">🔮 Próxima semana</button>
        <span id="rtTCtxBadge" class="rt-ctx-badge-t"></span>
      </div>

      <div id="rtTSecCorrente">
        <div class="radar-grid">${cardsHtml}</div>
        ${tendenciasHtml ? `<div class="section-title">📈 Tendências do mercado de agências</div><div class="trend-grid">${tendenciasHtml}</div>` : ''}
        ${ameacasHtml ? `<div class="section-title">🚨 Alertas · Ameaças</div>${ameacasHtml}` : ''}
      </div>

      <div id="rtTSecProxima" style="display:none">
        <div class="section-title">🎯 Oportunidades para a próxima semana</div>
        ${oppsHtml}
      </div>

      <div class="section-title">📂 Relatório Radar completo</div>
      <div class="files-bar">
        <div class="files-bar-title">Caminho do arquivo radar</div>
        <div class="files-grid">
          <div class="path-row">
            <span class="path-icon">📄</span>
            <div class="path-info">
              <div class="path-name">${esc(radarFileName)}</div>
              <div class="path-txt">${esc(RADAR.radarFile)}</div>
            </div>
            <div class="btn-row">
              <button class="copy-btn" onclick="cp('${RADAR.radarFile.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}',this)">Copiar</button>
            </div>
          </div>
        </div>
      </div>
    </div>`);
}

/* ── Radar Toggle TRAÇÃO ── */
function _radarAutoModeT() {
  var d = new Date().getDay(); // 0=Dom,1=Seg,...,6=Sab
  return (d >= 4 || d === 0) ? 'proxima' : 'corrente';
}
function setRadarModeT(m) {
  var cc = document.getElementById('rtTSecCorrente');
  var cp2 = document.getElementById('rtTSecProxima');
  var bc = document.getElementById('rtTChipCorrente');
  var bp = document.getElementById('rtTChipProxima');
  var badge = document.getElementById('rtTCtxBadge');
  if (!cc || !cp2) return;
  if (m === 'proxima') {
    cc.style.display = 'none'; cp2.style.display = 'block';
    bc.classList.remove('active'); bp.classList.add('active');
    badge.textContent = '🔮 Planejando próxima semana';
    badge.className = 'rt-ctx-badge-t rt-ctx-proxima-t';
  } else {
    cc.style.display = 'block'; cp2.style.display = 'none';
    bc.classList.add('active'); bp.classList.remove('active');
    badge.textContent = '📊 Inteligência da semana atual';
    badge.className = 'rt-ctx-badge-t rt-ctx-corrente-t';
  }
}
function initRadarToggleT() {
  var auto = _radarAutoModeT();
  var bp = document.getElementById('rtTChipProxima');
  if (!bp) return;
  if (auto !== 'proxima') {
    bp.classList.add('locked');
    bp.title = 'Disponível toda quinta às 08h após execução do radar';
  }
  setRadarModeT(auto);
}

(function init() {
  document.body.insertAdjacentHTML('beforeend', '<div id="tabs-container"></div><div id="pages-container"></div>');
  buildTopbar();
  buildTabs();
  buildDashboard();
  SEMANAS.forEach(s => buildSemana(s));
  buildRadar();
  initRadarToggleT();
  showPage('dashboard', document.querySelector('.tab'));
})();
/* ── AI Prompt Copy ── */
function copyAiPrompt(id, btn) {
  var ta = document.getElementById(id);
  if (!ta) return;
  ta.select();
  document.execCommand('copy');
  var orig = btn.textContent;
  btn.textContent = '✓ Copiado!';
  setTimeout(function(){ btn.textContent = orig; }, 1800);
}
</script>
