*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,Arial,sans-serif;background:#F0F2F5;color:#1F2937;font-size:14px;}
.topbar{background:var(--primary);color:white;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}

.tab:hover{color:#374151;background:#F9FAFB;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.page{display:none;padding:20px;max-width:1100px;margin:0 auto;}
.page.active{display:block;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px;}
.card{background:white;border-radius:10px;padding:16px;border:1px solid var(--border);}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);}
.section-title{font-size:13px;font-weight:700;color:var(--dark);margin:20px 0 10px;display:flex;align-items:center;gap:8px;}

.files-bar{background:white;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:20px;}
.files-bar-title{font-size:12px;font-weight:700;color:var(--dark);margin-bottom:10px;}
.files-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px;}
.path-row{display:flex;align-items:center;gap:8px;background:#F8FAFC;border:1px solid #CBD5E1;border-radius:6px;padding:7px 10px;}
.path-icon{font-size:15px;flex-shrink:0;}
.path-info{flex:1;min-width:0;}
.path-name{font-size:12px;font-weight:600;color:#1F2937;}
.path-txt{font-family:monospace;font-size:10px;color:#64748B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-row{display:flex;gap:5px;flex-shrink:0;}
.copy-btn{padding:4px 9px;background:#0A1B33;color:white;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;transition:background .2s;}
.copy-btn:hover{background:#1E90FF;}
.copy-btn.ok{background:#16A085;}
.drive-btn{padding:4px 9px;background:var(--primary);color:white;border:none;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px;}

.delivery-banner h3{font-size:14px;font-weight:800;margin:0;}
.delivery-banner p{font-size:12px;opacity:.8;margin:3px 0 0;}
.notion-btn{display:inline-flex;align-items:center;gap:6px;background:white;color:#1A1A1A;border:none;border-radius:6px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;}
.brand-strip{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.swatch{display:flex;align-items:center;gap:8px;background:white;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;}

.swatch-label{font-weight:700;}
.swatch-hex{font-family:monospace;color:var(--gray);font-size:10px;}
.swatch-uso{font-size:10px;color:var(--gray);}
.pilar-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.pilar-card{flex:1;min-width:120px;background:white;border:1px solid var(--border);border-radius:8px;padding:10px 14px;border-top:3px solid var(--primary);}
.pilar-cod{font-size:18px;font-weight:800;color:var(--primary);}
.pilar-nome{font-size:12px;font-weight:700;color:#374151;}
.pilar-pct{font-size:20px;font-weight:800;color:var(--accent);margin-top:4px;}
.weeks-table{width:100%;border-collapse:collapse;font-size:13px;}
.weeks-table th{background:var(--primary);color:white;padding:8px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;}
.weeks-table td{padding:9px 14px;border-bottom:1px solid var(--border);}
.weeks-table tr:last-child td{border-bottom:none;}
.weeks-table tr:hover td{background:#F9FAFB;}
.s-done{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:#D1FAE5;color:#065F46;}

.s-pending{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:#F3F4F6;color:#6B7280;}

/* RADAR */
.tab.radar.active{color:#1E90FF;border-bottom-color:#1E90FF;}

.rt-chip-corrente-m{background:#EBF5FF;color:#1E3A5F;border-color:#93C5FD;}
.rt-chip-corrente-m.active{background:#0A1B33;color:#fff;border-color:#0A1B33;}
.rt-chip-proxima-m{background:#F3F4F6;color:#9CA3AF;border-color:#E5E7EB;}
.rt-chip-proxima-m.active{background:#1E90FF;color:#fff;border-color:#1E90FF;}
.rt-chip-proxima-m.locked{opacity:.35;cursor:not-allowed;border-style:dashed;}
.rt-ctx-badge-m{margin-left:auto;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.rt-ctx-corrente-m{background:#EBF5FF;color:#1E3A5F;}
.rt-ctx-proxima-m{background:#DBEAFE;color:#1D4ED8;}

.radar-card-head{padding:12px 16px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cp(txt,btn){if(!txt)return;navigator.clipboard.writeText(txt).then(()=>{btn.classList.add('ok');btn.textContent='✓';const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>{t.classList.remove('show');btn.classList.remove('ok');btn.textContent='Copiar';},1800);});}
function showPage(id,el){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');if(el)el.classList.add('active');}
function statusBadge(s){if(s==='done')return`<span class="s-done">✅ Entregue</span>`;if(s==='progress')return`<span class="s-progress">🔄 Em andamento</span>`;return`<span class="s-pending">⏳ Pendente</span>`;}

  const pulseHtml=`<div class="pulse-strip"><div class="pulse-chip"><div class="pulse-num">${SC.concorrentes.length}</div><div class="pulse-lbl">perfis<br>monitorados</div></div><div class="pulse-chip"><div class="pulse-num">${SC.tendencias.length}</div><div class="pulse-lbl">tendências<br>monitoradas</div></div><div class="pulse-chip ${alertasAltos>0?'alert':''}"><div class="pulse-num">${SC.alertas.length}</div><div class="pulse-lbl">alertas &<br>oportunidades</div></div></div>`;
  const topAlerta=(SC.alertas||[]).find(a=>a.nivel==='alto');
  const alertBanner=topAlerta?`<div class="alert-banner"><div class="ab-icon">⚠️</div><div><div class="ab-title">${esc(topAlerta.titulo)}</div><div class="ab-acao">${esc(topAlerta.corpo)}</div></div></div>`:'';
  document.getElementById('pages-container').insertAdjacentHTML('beforeend',`
  <div id="page-radar" class="page">
    <div class="radar-header"><div><div style="font-size:11px;opacity:.6;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">🔭 Inteligência Competitiva</div><h2>Radar · ADFly Soluções Aéreas</h2><div class="radar-meta">Última execução: ${esc(RADAR.ultimaExecucao)} · Próxima: ${esc(RADAR.proximaExecucao)}</div></div><span class="radar-badge">${SC.concorrentes.length} perfis + nichos monitorados</span></div>
    ${pulseHtml}${alertBanner}
    <div class="rt-toggle-m" id="radarToggleM">
      <span class="rt-chip-m rt-chip-corrente-m" id="rtMChipCorrente" onclick="setRadarModeM('corrente')">📊 Semana em curso · ${esc(SC.label)}</span>
      <span class="rt-chip-m rt-chip-proxima-m" id="rtMChipProxima" onclick="setRadarModeM('proxima')">🔮 Próxima semana · ${esc(SP.label)}</span>
      <span id="rtMContextBadge" class="rt-ctx-badge-m"></span>
    </div>
    <div id="rtMSecCorrente">
      <div class="section-title">👥 Perfis e nichos monitorados</div>
      <div class="radar-grid">${buildCards(SC.concorrentes)}</div>
      <div class="section-title">📈 Tendências de mercado</div><div class="trend-grid">${buildTend(SC.tendencias)}</div>
      <div class="section-title">🚨 Alertas e oportunidades</div>${buildAlertas(SC.alertas)}
    </div>
    <div id="rtMSecProxima" style="display:none">
      <div class="section-title">👥 Perfis e nichos monitorados</div>
      <div class="radar-grid">${buildCards(SP.concorrentes)}</div>
      <div class="section-title">📈 Tendências de mercado <span style="margin-left:8px;font-size:11px;background:#EBF5FF;color:#1E3A5F;padding:2px 8px;border-radius:10px;font-weight:500">com gancho editorial</span></div><div class="trend-grid">${buildTend(SP.tendencias)}</div>
      <div class="section-title">🚨 Alertas e oportunidades</div>${buildAlertas(SP.alertas)}
    </div>
  </div>`);
}

function _radarAutoModeM(){var d=new Date().getDay();return(d>=4||d===0)?'proxima':'corrente';}
function setRadarModeM(m){var auto=_radarAutoModeM();if(m==='proxima'&&auto!=='proxima')return;var cc=document.getElementById('rtMChipCorrente');var cp2=document.getElementById('rtMChipProxima');var badge=document.getElementById('rtMContextBadge');var secC=document.getElementById('rtMSecCorrente');var secP=document.getElementById('rtMSecProxima');if(!cc)return;cc.classList.toggle('active',m==='corrente');cp2.classList.toggle('active',m==='proxima');if(secC)secC.style.display=m==='corrente'?'block':'none';if(secP)secP.style.display=m==='proxima'?'block':'none';if(m==='corrente'){badge.textContent='Semana em andamento';badge.className='rt-ctx-badge-m rt-ctx-corrente-m';}else{badge.textContent='🔮 Próxima semana';badge.className='rt-ctx-badge-m rt-ctx-proxima-m';}}
function initRadarToggleM(){var auto=_radarAutoModeM();var cp2=document.getElementById('rtMChipProxima');if(!cp2)return;if(auto!=='proxima'){cp2.classList.add('locked');cp2.title='Disponível toda quinta às 08h';}setRadarModeM(auto);}

function copyAiPrompt(id,btn){var ta=document.getElementById(id);if(!ta)return;ta.select();document.execCommand('copy');var orig=btn.textContent;btn.textContent='✓ Copiado!';setTimeout(function(){btn.textContent=orig;},1800);}

(function init(){
  document.body.insertAdjacentHTML('beforeend','<div id="tabs-container"></div><div id="pages-container"></div>');
  buildTopbar(); buildTabs(); buildDashboard();
  SEMANAS.forEach(s=>buildSemana(s));
  buildRadar(); initRadarToggleM();
  showPage('dashboard',document.querySelector('.tab'));
})();
</script>
</body>
