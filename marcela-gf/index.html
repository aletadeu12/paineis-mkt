function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cp(txt, btn) {
  if (!txt) return;
  navigator.clipboard.writeText(txt).then(() => {
    btn.classList.add('ok');
    btn.textContent = '✓';
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => { t.classList.remove('show'); btn.classList.remove('ok'); btn.textContent = 'Copiar'; }, 1800);
  });
}

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (el) el.classList.add('active');
}

    const mudBadge = c.mudancaDetectada
      ? `<span class="ia-badge mud-sim">⚡ SIM</span>`
      : `<span class="ia-badge mud-nao">NÃO</span>`;
    return `
    <div class="radar-card">
      <div class="radar-card-head" style="background:${esc(c.headBg)};color:${esc(c.headFg)}">
        ${esc(c.nome)}
        <span class="radar-tag" style="background:${esc(c.tagBg)};color:${esc(c.tagFg)};margin-left:auto">${esc(c.tag)}</span>
      </div>
      <div class="radar-card-body">
        <div class="comp-fields">
          <div class="comp-field" style="grid-column:1/-1">
            <div class="cf-label">📢 O que publicaram esta semana</div>
            <div class="cf-value">${esc(c.oQuePublicaram||'—')}</div>
          </div>
          <div class="comp-field">
            <div class="cf-label">🤖 Mencionou IA?</div>
            <div class="cf-value">${iaBadge}</div>
          </div>
          <div class="comp-field">
            <div class="cf-label">🔄 Mudança detectada?</div>
            <div class="cf-value">${mudBadge}</div>
          </div>
          <div class="comp-field" style="grid-column:1/-1">
            <div class="cf-label">🎯 O que Marcela usa disso</div>
            <div class="cf-value">${esc(c.opp)}</div>
          </div>
        </div>
        <div class="radar-copy"><strong>Ângulo AG-05:</strong> "${esc(c.angulo)}"</div>
      </div>
    </div>`;
  }).join('');

  /* ── Tendências ── */
  const tendenciasHtml = (RADAR.tendencias||[]).map(t => `
    <div class="trend-card">
      <h4>${esc(t.titulo)}</h4>
      <p>${esc(t.corpo)}</p>
    </div>`).join('');

  /* ── Alertas/ameaças ── */
  const ameacasHtml = (RADAR.alertas||[]).map(a => {
    const cls = a.nivel === 'alto' ? 'threat-alto' : a.nivel === 'opp' ? 'threat-opp' : 'threat-medio';
    return `
    <div class="threat-card ${cls}">
      <h4>${esc(a.titulo)}</h4>
      <div class="threat-corpo">${esc(a.corpo)}</div>
      <div class="threat-acao">→ ${esc(a.acao)}</div>
    </div>`;
  }).join('');

  /* ── Oportunidades (próxima semana) ── */
  const oppsHtml = (RADAR.oportunidades||[]).map(o => `
    <div class="opp-card">
      <h4>🎯 ${esc(o.titulo)}</h4>
      <div class="opp-meta">
        <span>${esc(o.pilar)}</span>
        <span>${esc(o.formato)}</span>
        ${o.trigger?`<span style="background:#FEF3C7;color:#92400E;">trigger: ${esc(o.trigger)}</span>`:''}
        ${o.prioridade==='alta'?`<span style="background:#FEE2E2;color:#A32D2D;">prioridade alta</span>`:`<span>prioridade média</span>`}
      </div>
      <div class="opp-tema">"${esc(o.tema)}"</div>
      <div class="opp-why">⚡ <strong>Por que agora:</strong> ${esc(o.porqueAgora)}</div>
    </div>`).join('');

  const html = `
    <div id="page-radar" class="page">
      <div class="radar-header">
        <div>
          <div style="font-size:11px;opacity:.6;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">🔭 Inteligência Competitiva</div>
          <h2>Radar · ${esc(CLIENTE.nome)}</h2>
          <div class="radar-meta">Última execução: ${esc(RADAR.ultimaExecucao)} · Próxima: ${esc(RADAR.proximaExecucao)}</div>
        </div>
        <span class="radar-badge">${RADAR.concorrentes.length} perfis Grupo A + 8 referências</span>
      </div>

      ${RADAR.resumoExecutivo ? `
      <div class="exec-brief">
        <div class="exec-label">📌 Briefing Executivo · ${esc(RADAR.ultimaExecucao)}</div>
        <div class="exec-text">${esc(RADAR.resumoExecutivo)}</div>
      </div>` : ''}

      ${pulseHtml}
      ${alertBannerHtml}

      <div class="rt-toggle-m" id="radarToggleM">
        <span class="rt-chip-m rt-chip-corrente-m" id="rtMChipCorrente" onclick="setRadarModeM('corrente')">📊 Semana em curso</span>
        <span class="rt-chip-m rt-chip-proxima-m" id="rtMChipProxima" onclick="setRadarModeM('proxima')">🔮 Próxima semana</span>
        <span id="rtMContextBadge" class="rt-ctx-badge-m"></span>
      </div>

      <div id="rtMSecCorrente">
        <div class="radar-grid">${cardsHtml}</div>
        ${tendenciasHtml ? `<div class="section-title">📈 Tendências do nicho (semana)</div><div class="trend-grid">${tendenciasHtml}</div>` : ''}
        ${ameacasHtml ? `<div class="section-title">🚨 Alertas · Ameaças · Oportunidades</div>${ameacasHtml}` : ''}
      </div>

      <div id="rtMSecProxima" style="display:none">
        <div class="section-title">🎯 Oportunidades para a próxima semana</div>
        ${oppsHtml}
      </div>

      <div class="section-title">📂 Relatório Radar completo</div>
      <div class="files-bar">
        <div class="files-bar-title">🔭 Arquivo do Radar — clique Copiar → Win+R → cole → Enter</div>
        <div class="files-grid">
          <div class="path-row">
            <span class="path-icon">📄</span>
            <div class="path-info">
              <div class="path-name">Radar ${esc(CLIENTE.nome)} · ${esc(RADAR.ultimaExecucao)}</div>
              <div class="path-txt">${esc(RADAR.radarFile.split('\\').slice(-3).join('\\'))}</div>
            </div>
            <div class="btn-row">
              <button class="copy-btn" onclick="cp('${RADAR.radarFile.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}',this)">Copiar</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('pages-container').insertAdjacentHTML('beforeend', html);
}

/* ── Init ── */
(function init() {
  document.body.insertAdjacentHTML('beforeend', '<div id="tabs-container"></div><div id="pages-container"></div>');
  buildTopbar();
  buildTabs();
  buildDashboard();
  SEMANAS.forEach(s => buildSemana(s));
  buildRadar();
  initRadarToggleM();
})();

function _radarAutoModeM(){var d=new Date().getDay();return(d>=4||d===0)?'proxima':'corrente';}
function setRadarModeM(m){
  var auto=_radarAutoModeM();
  if(m==='proxima'&&auto!=='proxima')return;
  var cc=document.getElementById('rtMChipCorrente');
  var cp=document.getElementById('rtMChipProxima');
  var badge=document.getElementById('rtMContextBadge');
  var secC=document.getElementById('rtMSecCorrente');
  var secP=document.getElementById('rtMSecProxima');
  if(!cc)return;
  cc.classList.toggle('active',m==='corrente');
  cp.classList.toggle('active',m==='proxima');
  if(secC) secC.style.display = m==='corrente'?'block':'none';
  if(secP) secP.style.display = m==='proxima'?'block':'none';
  if(m==='corrente'){
    badge.textContent='Semana em andamento';
    badge.className='rt-ctx-badge-m rt-ctx-corrente-m';
  }else{
    badge.textContent='🔮 Input semana seguinte';
    badge.className='rt-ctx-badge-m rt-ctx-proxima-m';
  }
}
function initRadarToggleM(){
  var auto=_radarAutoModeM();
  var cp=document.getElementById('rtMChipProxima');
  if(!cp)return;
  if(auto!=='proxima'){cp.classList.add('locked');cp.title='Disponível toda quinta às 08h';}
  setRadarModeM(auto);
}
</script>

</body>
</html>
