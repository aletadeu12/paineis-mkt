function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cp(txt, btn) {
  if (!txt) return;
  navigator.clipboard.writeText(txt).then(() => {
    btn.classList.add('ok');
    btn.textContent = '✓';
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => { t.classList.remove('show'); btn.classList.remove('ok'); btn.textContent = 'Copiar'; }, 1800);
  });
}

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (el) el.classList.add('active');
}

    <div class="grade-cell header">DIA</div>
    <div class="grade-cell header" style="background:#E1306C;color:white">📸 Instagram</div>
    <div class="grade-cell header" style="background:#000;color:white">🎵 TikTok</div>
    <div class="grade-cell header" style="background:#0A66C2;color:white">💼 LinkedIn</div>
    <div class="grade-cell header" style="background:#FF0000;color:white">▶️ YouTube</div>`;

  s.grade.forEach(g => {
    gradeHtml += `<div class="grade-cell dayname">${esc(g.dia)}</div>`;
    [g.ig, g.tk, g.li, g.yt].forEach(cell => {
      if (!cell) {
        gradeHtml += `<div class="grade-cell empty">—</div>`;
      } else {
        gradeHtml += `<div class="grade-cell"><span class="chip">${esc(cell.chip)}</span><br>${esc(cell.txt)}</div>`;
      }
    });
  });
  gradeHtml += `</div></div>`;

  /* Canva links */
  const canvaHtml = s.canva.map(c => `
    <div class="canva-section">
      <div class="canva-head">
        <div>
          <h4>🎨 ${esc(c.nome)}</h4>
          <small>${esc(c.desc)} · ${c.slides} slides</small>
        </div>
      </div>
      <table class="canva-table">
        ${c.links.map(l => `
          <tr>
            <td class="slide-num">${esc(l.s)}</td>
            <td>${esc(l.tema)}</td>
            <td style="text-align:right;width:100px"><a href="${esc(l.url)}" target="_blank" class="canva-link">✏️ Canva</a></td>
          </tr>`).join('')}
      </table>
    </div>`).join('');

  /* Content cards */
  const postsHtml = s.posts.map((p, i) => {
    const storiesHtml = p.stories ? `
      <div class="label">Stories IG</div>
      <ul class="story-list">${p.stories.map(st => `<li>${esc(st)}</li>`).join('')}</ul>` : '';
    const extrasHtml = (p.extras||[]).map(e => `
      <div class="label">${esc(e.label)}</div>
      <div class="extra-block">${esc(e.txt)}</div>`).join('');
    const aiPromptId = 'aip-' + i + '-' + (p.dia||'').replace(/[^a-z0-9]/gi,'');
    const aiPromptHtml = p.aiPrompt ? `
      <div class="ai-prompt-block">
        <div class="ai-prompt-label">🎨 AI Prompt (usar no ChatGPT / Midjourney / Gemini)</div>
        <textarea class="ai-prompt-textarea" id="${aiPromptId}" readonly>${esc(p.aiPrompt)}</textarea>
        <button class="copy-ai-btn" onclick="copyAiPrompt('${aiPromptId}',this)">Copiar Prompt</button>
      </div>` : '';
    return `
      <div class="content-card">
        <div class="content-header">
          <span class="day">${esc(p.dia)}</span>
          <span class="title">${esc(p.titulo)}</span>
          <span class="pilar-badge">${esc(p.pilar)}</span>
          <span class="format">${esc(p.formato)}</span>
        </div>
        <div class="content-body">
          <div class="label">Gancho</div>
          <div class="gancho">"${esc(p.gancho)}"</div>
          ${p.slides ? `<div class="label">Slides</div><div class="edl">${esc(p.slides)}</div>` : ''}
          ${p.legenda ? `<div class="label">Legenda / Caption</div><div class="legenda">${esc(p.legenda).replace(/\n/g,'<br>')}</div>` : ''}
          ${p.cta ? `<div class="label">CTA</div><div class="cta">${esc(p.cta)}</div>` : ''}
          ${p.hashtags ? `<div class="hashtags">${esc(p.hashtags)}</div>` : ''}
          ${storiesHtml}
          ${extrasHtml}
          ${aiPromptHtml}
        </div>
      </div>`;
  }).join('');

  /* Métricas */
  const metHtml = (s.metricas||[]).map(m => `
    <tr><td>${esc(m.label)}</td><td class="met-meta">${esc(m.meta)}</td></tr>`).join('');

  const html = `
    <div id="page-${esc(s.id)}" class="page">

      <!-- Notion delivery banner -->
      <div class="delivery-banner">
        <div>
          <h3>📦 ${esc(s.labelFull)} · ${statusBadge(s.status)}</h3>
          <p>Objetivo: ${esc(s.objetivo)}</p>
        </div>
        ${s.notionUrl ? `<a href="${esc(s.notionUrl)}" target="_blank" class="notion-btn">📋 Ver entrega no Notion</a>` : ''}
      </div>

      <!-- Files -->
      <div class="files-bar">
        <div class="files-bar-title">📂 Arquivos — clique Copiar → Win+R → cole → Enter</div>
        <div class="files-grid">${filesHtml}</div>
      </div>

      <!-- Grade -->
      <div class="section-title">📅 Grade Editorial da Semana</div>
      ${gradeHtml}

      <!-- Canva links -->
      <div class="section-title">🎨 Canva — Slides Individuais</div>
      ${canvaHtml}

      <!-- Posts detalhados -->
      <div class="section-title">✍️ Posts Detalhados · Copy + Roteiro</div>
      ${postsHtml}

      <!-- Métricas -->
      <div class="section-title">📊 Métricas · Metas da Semana 1</div>
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:20px">
        <table class="met-table">
          <thead><tr><th>Métrica</th><th>Meta</th></tr></thead>
          <tbody>${metHtml}</tbody>
        </table>
      </div>
    </div>`;

  document.getElementById('pages-container').insertAdjacentHTML('beforeend', html);
}

/* ── Radar page ── */
function buildRadar() {
  const SC = RADAR.semanaCorrente;
  const SP = RADAR.semanaProxima;

  /* helper: gera cards de concorrentes (sem badges de IA/mudança) */
  function buildCards(lista) {
    return lista.map(c => `
    <div class="radar-card">
      <div class="radar-card-head" style="background:${esc(c.headBg)};color:${esc(c.headFg)}">
        ${esc(c.nome)}
        <span class="radar-tag" style="background:${esc(c.tagBg)};color:${esc(c.tagFg)};margin-left:auto">${esc(c.tag)}</span>
      </div>
      <div class="radar-card-body">
        <div class="comp-fields">
          <div class="comp-field" style="grid-column:1/-1">
            <div class="cf-label">📢 O que publicaram</div>
            <div class="cf-value">${esc(c.oQuePublicaram||'—')}</div>
          </div>
          <div class="comp-field" style="grid-column:1/-1">
            <div class="cf-label">🎯 O que Marcela usa disso</div>
            <div class="cf-value">${esc(c.opp)}</div>
          </div>
        </div>
      </div>
    </div>`).join('');
  }

  /* helper: gera cards de tendências (semanaCorrente sem gancho, semanaProxima com gancho) */
  function buildTendencias(lista) {
    return lista.map(t => `
    <div class="trend-card">
      <h4>${esc(t.titulo)}</h4>
      <p>${esc(t.corpo)}</p>
      ${t.gancho ? `<div style="margin-top:8px;padding:8px 12px;background:#EAF4ED;border-left:3px solid #1B6A39;border-radius:4px;font-size:12px;color:#1B6A39;font-style:italic">${esc(t.gancho)}</div>` : ''}
      ${t.src ? `<div style="font-size:10px;opacity:.5;margin-top:6px">Fonte: ${esc(t.src)}</div>` : ''}
    </div>`).join('');
  }

  /* helper: gera cards de alertas */
  function buildAlertas(lista) {
    return lista.map(a => {
      const cls = a.nivel === 'alto' ? 'threat-alto' : a.nivel === 'opp' ? 'threat-opp' : 'threat-medio';
      return `
    <div class="threat-card ${cls}">
      <h4>${esc(a.titulo)}</h4>
      <div class="threat-corpo">${esc(a.corpo)}</div>
    </div>`;
    }).join('');
  }

  /* ── Pulse KPIs (baseados na semana em curso) ── */
  const alertasAltos = (SC.alertas||[]).filter(a => a.nivel === 'alto').length;
  const pulseHtml = `
    <div class="pulse-strip">
      <div class="pulse-chip">
        <div class="pulse-num">${SC.concorrentes.length}</div>
        <div class="pulse-lbl">concorrentes<br>diretos (Grupo A)</div>
      </div>
      <div class="pulse-chip">
        <div class="pulse-num">${SC.tendencias.length}</div>
        <div class="pulse-lbl">tendências<br>monitoradas</div>
      </div>
      <div class="pulse-chip ${alertasAltos > 0 ? 'alert' : ''}">
        <div class="pulse-num">${SC.alertas.length}</div>
        <div class="pulse-lbl">alertas &<br>oportunidades</div>
      </div>
    </div>`;

  /* ── Alert banner (top alerta alto na semana em curso) ── */
  const topAlerta = (SC.alertas||[]).find(a => a.nivel === 'alto');
  const alertBannerHtml = topAlerta ? `
    <div class="alert-banner">
      <div class="ab-icon">⚠️</div>
      <div>
        <div class="ab-title">${esc(topAlerta.titulo)}</div>
        <div class="ab-acao">${esc(topAlerta.corpo)}</div>
      </div>
    </div>` : '';

  /* ── Blocos semanaCorrente ── */
  const cardsHtml = buildCards(SC.concorrentes);
  const tendenciasHtml = buildTendencias(SC.tendencias);
  const ameacasHtml = buildAlertas(SC.alertas);

  /* ── Blocos semanaProxima ── */
  const cardsHtmlP = buildCards(SP.concorrentes);
  const tendenciasHtmlP = buildTendencias(SP.tendencias);
  const ameacasHtmlP = buildAlertas(SP.alertas);

  const html = `
    <div id="page-radar" class="page">
      <div class="radar-header">
        <div>
          <div style="font-size:11px;opacity:.6;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">🔭 Inteligência Competitiva</div>
          <h2>Radar · ${esc(CLIENTE.nome)}</h2>
          <div class="radar-meta">Última execução: ${esc(RADAR.ultimaExecucao)} · Próxima: ${esc(RADAR.proximaExecucao)}</div>
        </div>
        <span class="radar-badge">${SC.concorrentes.length} perfis Grupo A + 8 referências</span>
      </div>

      ${pulseHtml}
      ${alertBannerHtml}

      <div class="rt-toggle-m" id="radarToggleM">
        <span class="rt-chip-m rt-chip-corrente-m" id="rtMChipCorrente" onclick="setRadarModeM('corrente')">📊 Semana em curso · ${esc(SC.label)}</span>
        <span class="rt-chip-m rt-chip-proxima-m" id="rtMChipProxima" onclick="setRadarModeM('proxima')">🔮 Próxima semana · ${esc(SP.label)}</span>
        <span id="rtMContextBadge" class="rt-ctx-badge-m"></span>
      </div>

      <div id="rtMSecCorrente">
        <div class="section-title">👥 Concorrentes monitorados · Grupo A</div>
        <div class="radar-grid">${cardsHtml}</div>
        ${tendenciasHtml ? `<div class="section-title">📈 Tendências de mercado</div><div class="trend-grid">${tendenciasHtml}</div>` : ''}
        ${ameacasHtml ? `<div class="section-title">🚨 Alertas e oportunidades</div>${ameacasHtml}` : ''}
      </div>

      <div id="rtMSecProxima" style="display:none">
        <div class="section-title">👥 Concorrentes monitorados · Grupo A</div>
        <div class="radar-grid">${cardsHtmlP}</div>
        ${tendenciasHtmlP ? `<div class="section-title">📈 Tendências de mercado <span style="margin-left:8px;font-size:11px;background:#EAF4ED;color:#1B6A39;padding:2px 8px;border-radius:10px;font-weight:500">com gancho editorial</span></div><div class="trend-grid">${tendenciasHtmlP}</div>` : ''}
        ${ameacasHtmlP ? `<div class="section-title">🚨 Alertas e oportunidades</div>${ameacasHtmlP}` : ''}
      </div>
    </div>`;

  document.getElementById('pages-container').insertAdjacentHTML('beforeend', html);
}

/* ── Init ── */
(function init() {
  document.body.insertAdjacentHTML('beforeend', '<div id="tabs-container"></div><div id="pages-container"></div>');
  buildTopbar();
  buildTabs();
  buildDashboard();
  SEMANAS.forEach(s => buildSemana(s));
  buildRadar();
  initRadarToggleM();
  showPage('dashboard', document.querySelector('.tab'));
})();

function _radarAutoModeM(){var d=new Date().getDay();return(d>=4||d===0)?'proxima':'corrente';}
function setRadarModeM(m){
  var auto=_radarAutoModeM();
  if(m==='proxima'&&auto!=='proxima')return;
  var cc=document.getElementById('rtMChipCorrente');
  var cp=document.getElementById('rtMChipProxima');
  var badge=document.getElementById('rtMContextBadge');
  var secC=document.getElementById('rtMSecCorrente');
  var secP=document.getElementById('rtMSecProxima');
  if(!cc)return;
  cc.classList.toggle('active',m==='corrente');
  cp.classList.toggle('active',m==='proxima');
  if(secC) secC.style.display = m==='corrente'?'block':'none';
  if(secP) secP.style.display = m==='proxima'?'block':'none';
  if(m==='corrente'){
    badge.textContent='Semana em andamento';
    badge.className='rt-ctx-badge-m rt-ctx-corrente-m';
  }else{
    badge.textContent='🔮 Input semana seguinte';
    badge.className='rt-ctx-badge-m rt-ctx-proxima-m';
  }
}

/* ── AI Prompt Copy ── */
function copyAiPrompt(id, btn) {
  var ta = document.getElementById(id);
  if (!ta) return;
  ta.select();
  document.execCommand('copy');
  var orig = btn.textContent;
  btn.textContent = '✓ Copiado!';
  setTimeout(function(){ btn.textContent = orig; }, 1800);
}
</script>
